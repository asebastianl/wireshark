<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wireshark</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Consolas, "Courier New", monospace;
      background: #eeeeee;
      color: #d1fae5;
    }

    main {
      width: min(720px, calc(100% - 32px));
      overflow: hidden;
      background: #07111f;
      border: 1px solid #1f3a5f;
      border-radius: 8px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #0b1628;
      border-bottom: 1px solid #1f3a5f;
      color: #93c5fd;
      font-size: 0.875rem;
    }

    .terminal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }

    .terminal-dot:nth-child(2) {
      background: #f59e0b;
    }

    .terminal-dot:nth-child(3) {
      background: #22c55e;
      margin-right: 8px;
    }

    .terminal-content {
      padding: 24px;
    }

    img {
      display: block;
      width: min(100%, 420px);
      max-height: 180px;
      height: auto;
      margin: 0 auto 20px;
      border-radius: 6px;
      border: 1px solid #164e63;
      background: #020617;
      object-fit: contain;
    }

    .command-window {
      width: 100%;
      box-sizing: border-box;
      min-height: 220px;
      padding: 14px;
      overflow-y: auto;
      font: inherit;
      border: 1px solid #22c55e;
      border-radius: 6px;
      background: #020617;
      color: #d1fae5;
    }

    .command-window:focus-within {
      outline: 2px solid #0f766e;
      border-color: #5eead4;
    }

    .command-history {
      display: grid;
      gap: 8px;
      margin: 0 0 8px;
      padding: 0;
      list-style: none;
    }

    .command-history li,
    .command-line {
      display: flex;
      gap: 8px;
      align-items: baseline;
    }

    .prompt {
      flex: 0 0 auto;
      color: #5eead4;
    }

    .command-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    input {
      flex: 1;
      min-width: 0;
      padding: 0;
      font: inherit;
      border: 0;
      outline: 0;
      background: transparent;
      color: #d1fae5;
      caret-color: #22c55e;
    }

    input::placeholder {
      color: #64748b;
    }
  </style>
</head>
<body>
  <main id="wireshark-terminal">
    <div class="terminal-bar">
      <span class="terminal-dot"></span>
      <span class="terminal-dot"></span>
      <span class="terminal-dot"></span>
      wireshark-console
    </div>

    <div class="terminal-content">
      <img src="images/wireshark_logo.svg" alt="Wireshark packet capture">

      <section class="command-window" id="command-window" aria-label="Command prompt">
        <ul class="command-history" id="command-history"></ul>
        <form class="command-line" id="command-form">
          <span class="prompt">user@wireshark:~$</span>
          <input id="command-input" name="command" type="text" autocomplete="off" placeholder="type a command and press Enter" aria-label="Command">
        </form>
      </section>
    </div>
  </main>

  <script>
    const commandWindow = document.querySelector('#command-window');
    const form = document.querySelector('#command-form');
    const input = document.querySelector('#command-input');
    const history = document.querySelector('#command-history');

    commandWindow.addEventListener('click', () => {
      input.focus();
    });

    function postCommand() {
      const message = input.value.trim();

      if (!message) {
        return;
      }

      const item = document.createElement('li');
      const prompt = document.createElement('span');
      const commandText = document.createElement('span');

      prompt.className = 'prompt';
      prompt.textContent = 'user@wireshark:~$';
      commandText.className = 'command-text';
      commandText.textContent = message;

      item.append(prompt, commandText);
      history.append(item);
      input.value = '';
      input.focus();
      commandWindow.scrollTop = commandWindow.scrollHeight;
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      postCommand();
    });

    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        postCommand();
      }
    });
  </script>
</body>
</html>
